<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Neon Invaders</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.x/dist/pixi.min.js"></script>
</head>

<body>
  <div class="game-wrap">
    <div class="canvas-container">
      <canvas id="game"></canvas>
      
      <!-- Minimal HTML Overlays for complex input -->
      <div id="help-screen" class="overlay hidden"></div>

      <div id="boss-clear-screen" class="overlay hidden"></div>

      <div id="overlay" class="overlay hidden"></div>

      <div id="start-screen" class="overlay"></div>
    </div>

    <div id="touch-controls" class="touch-controls">
      <button id="btn-left" class="touch-btn">◀</button>
      <button id="btn-shoot" class="touch-btn shoot">SHOOT</button>
      <button id="btn-pause" class="touch-btn pause">⏸</button>
      <button id="btn-right" class="touch-btn">▶</button>
    </div>
  </div>
  <script type="module" src="game.js"></script>
</body>

</html>
