<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Neon Invaders</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.x/dist/pixi.min.js"></script>
</head>

<body>
  <div class="game-wrap">
    <div class="canvas-container">
      <canvas id="game"></canvas>
      
      <!-- Only keeping minimal interactive HTML elements that require complex DOM input -->
      <div id="help-screen" class="overlay hidden">
        <!-- Kept as pointer-event sink, content is now in Pixi -->
      </div>

      <div id="boss-clear-screen" class="overlay hidden">
        <h2 class="win">BOSS DEFEATED!</h2>
        <div class="reward-container">
          <p id="boss-level-text">LEVEL 10 COMPLETE</p>
          <ul id="reward-list">
            <li>+2 Max Health</li>
            <li>+2 Max Damage</li>
            <li>Right Pod Unlocked: Lightning</li>
          </ul>
        </div>
        <p class="blink">Press SPACE or Tap to continue</p>
      </div>

      <div id="overlay" class="overlay hidden">
        <div id="name-input-container" class="hidden">
          <h3>NEW HIGH SCORE!</h3>
          <div class="arcade-input">
            <div class="char-col">
              <button class="touch-arrow up" data-dir="up" data-index="0">▲</button>
              <span class="char active" data-index="0">A</span>
              <button class="touch-arrow down" data-dir="down" data-index="0">▼</button>
            </div>
            <div class="char-col">
              <button class="touch-arrow up" data-dir="up" data-index="1">▲</button>
              <span class="char" data-index="1">A</span>
              <button class="touch-arrow down" data-dir="down" data-index="1">▼</button>
            </div>
            <div class="char-col">
              <button class="touch-arrow up" data-dir="up" data-index="2">▲</button>
              <span class="char" data-index="2">A</span>
              <button class="touch-arrow down" data-dir="down" data-index="2">▼</button>
            </div>
          </div>
          <button id="save-name" class="touch-btn shoot">SAVE NAME</button>
          <p class="small">ARROWS to change · ENTER to save</p>
        </div>
        
        <p id="overlay-text">GAME OVER</p>
        <button id="restart">Play again</button>
      </div>

      <div id="start-screen" class="overlay" tabindex="0">
        <!-- Content now in Pixi -->
      </div>
    </div>

    <div id="touch-controls" class="touch-controls">
      <button id="btn-left" class="touch-btn">◀</button>
      <button id="btn-shoot" class="touch-btn shoot">SHOOT</button>
      <button id="btn-pause" class="touch-btn pause">⏸</button>
      <button id="btn-right" class="touch-btn">▶</button>
    </div>
    <p class="controls">← → move · SPACE shoot · H help · ESC end</p>
  </div>
  <script type="module" src="game.js"></script>
</body>

</html>
